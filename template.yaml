AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TransferHub modern data movement API

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        TRANSFER_TABLE: !Ref TransferTable
        LANDING_BUCKET: transferhub-landing
        UPLOAD_URL_EXPIRY_SECONDS: 900
        API_KEY_SECRET_ID: api-keys-hub

Resources:
  TransferTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: transferhub-transfers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  TransferHubApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: TransferHubApi
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,x-api-key'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: TransferHubRequestAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          TransferHubRequestAuthorizer:
            FunctionPayloadType: REQUEST
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            Identity:
              Headers:
                - x-api-key
              ReauthorizeEvery: 0

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/auth/authorizer.handler
      Timeout: 10
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:api-keys-hub*'
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/auth/authorizer.ts
        Minify: false
        Sourcemap: true
        Target: es2022

  TransferHubApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/api/handler.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:api-keys-hub*'
        - DynamoDBCrudPolicy:
            TableName: !Ref TransferTable
        - S3CrudPolicy:
            BucketName: transferhub-landing
      Events:
        HealthRoute:
          Type: Api
          Properties:
            RestApiId: !Ref TransferHubApi
            Path: /v1/health
            Method: GET
            Auth:
              Authorizer: NONE
        ProxyRoute:
          Type: Api
          Properties:
            RestApiId: !Ref TransferHubApi
            Path: /v1/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/api/handler.ts
        Minify: false
        Sourcemap: true
        Target: es2022

Outputs:
  ApiBaseUrl:
    Description: Base URL for the deployed TransferHub API
    Value: !Sub 'https://${TransferHubApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
  TransferTableName:
    Value: !Ref TransferTable
  LandingBucketName:
    Value: transferhub-landing
